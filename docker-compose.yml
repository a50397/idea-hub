services:
  mongodb:
    image: mongo:7
    container_name: ideahub-mongodb
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: ideahub
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - ideahub-network
    healthcheck:
      test: |
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ideahub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mongodb://mongodb:27017/ideahub?replicaSet=rs0
      SESSION_SECRET: ${SESSION_SECRET:-your-super-secret-session-key-change-in-production}
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_PORT: 3001
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ideahub.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}    
    ports:
      - '3001:3001'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ideahub-network
    command: sh -c "npx prisma db push && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ideahub-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - ideahub-network

networks:
  ideahub-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
